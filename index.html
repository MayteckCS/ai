<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare | Mayteck Dashboard</title>
    <style>
        :root { 
            --orange: #f6821f; 
            --dark: #0f172a; 
            --card: #1e293b; 
            --border: #334155; 
            --text: #f8fafc; 
            --muted: #94a3b8;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--dark); color: var(--text); padding: 2rem; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        h1 { color: var(--orange); margin: 0; font-size: 1.5rem; letter-spacing: -0.5px; }
        
        .refresh-btn { background: var(--orange); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: transform 0.1s; }
        .refresh-btn:active { transform: scale(0.95); }

        .account-section { margin-bottom: 40px; }
        .account-title { font-size: 0.8rem; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; font-weight: 800; letter-spacing: 1.5px; display: flex; align-items: center; gap: 10px; }
        .account-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .domain-card { background: var(--card); padding: 16px 20px; border-radius: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .domain-name { font-weight: 600; font-size: 0.95rem; color: #fff; }
        
        .status { font-size: 0.65rem; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; font-weight: 900; }
        .active { color: #4ade80; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2); }
        .pending { color: #fbbf24; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); }
        
        #loading-zone { text-align: center; padding: 60px; color: var(--muted); font-style: italic; }
        .error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; padding: 20px; border-radius: 8px; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Cloudflare Dash</h1>
        <button class="refresh-btn" onclick="fetchCloudflareData()">Refresh Data</button>
    </header>

    <div id="dashboard-ui">
        <div id="loading-zone">Initializing connection...</div>
    </div>
</div>

<script>
    // YOUR API TOKEN
    const TOKEN = 'cfut_n2nGhAQcpuMdpNTiyrJlb8MaM2YQf54RpOPhQJB7ddd0bacc';
    
    // Using a CORS proxy to prevent "Failed to fetch" on local files
    const PROXY = "https://corsproxy.io/?";

    async function fetchCloudflareData() {
        const dash = document.getElementById('dashboard-ui');
        dash.innerHTML = '<div id="loading-zone">Fetching accounts and zones...</div>';

        try {
            // 1. Get Accounts
            const accUrl = encodeURIComponent("https://api.cloudflare.com/client/v4/accounts");
            const accRes = await fetch(PROXY + accUrl, {
                headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
            });
            const accData = await accRes.json();

            if (!accData.success) throw new Error(accData.errors[0]?.message || "Check API Token permissions.");

            dash.innerHTML = ''; // Clear loading screen

            // 2. Process each account found
            for (const account of accData.result) {
                const section = document.createElement('div');
                section.className = 'account-section';
                section.innerHTML = `
                    <div class="account-title">Account: ${account.name}</div>
                    <div class="grid" id="grid-${account.id}"></div>
                `;
                dash.appendChild(section);

                // 3. Get Domains (Zones) for this specific account
                const zoneUrl = encodeURIComponent(`https://api.cloudflare.com/client/v4/zones?account.id=${account.id}`);
                const zoneRes = await fetch(PROXY + zoneUrl, {
                    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
                });
                const zoneData = await zoneRes.json();
                const grid = document.getElementById(`grid-${account.id}`);

                if (zoneData.result.length === 0) {
                    grid.innerHTML = '<div style="color:var(--muted); font-size:0.85rem; padding: 10px;">No domains found in this account.</div>';
                }

                zoneData.result.forEach(zone => {
                    const card = document.createElement('div');
                    card.className = 'domain-card';
                    card.innerHTML = `
                        <span class="domain-name">${zone.name}</span>
                        <span class="status ${zone.status}">${zone.status}</span>
                    `;
                    grid.appendChild(card);
                });
            }
        } catch (error) {
            dash.innerHTML = `
                <div class="error-box">
                    <strong>Unable to connect to Cloudflare:</strong><br>
                    ${error.message}<br><br>
                    <small>Troubleshooting:<br>
                    1. Ensure your token has <b>Account:Read</b> and <b>Zone:Read</b>.<br>
                    2. Check if your internet connection is active.<br>
                    3. If using a VPN, it might be blocking the proxy.</small>
                </div>`;
        }
    }

    // Auto-load on open
    fetchCloudflareData();
</script>

</body>
</html>
