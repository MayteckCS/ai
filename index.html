<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloudflare | Mayteck Dash</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #f6821f; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .account-section { margin-top: 30px; border: 1px solid #334155; border-radius: 8px; overflow: hidden; }
        .acc-header { background: #334155; padding: 10px; font-size: 0.8rem; font-weight: bold; color: #94a3b8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1px; background: #334155; }
        .card { background: #1e293b; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; }
        .active { color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .error { color: #ef4444; background: #2a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cloudflare Dashboard</h1>
        <div id="dash">Connecting to Cloudflare...</div>
    </div>

    <script>
        const TOKEN = 'cfut_n2nGhAQcpuMdpNTiyrJlb8MaM2YQf54RpOPhQJB7ddd0bacc';
        // Switching to a more reliable proxy for GitHub Pages
        const PROXY = "https://api.allorigins.win/raw?url=";

        async function init() {
            const dash = document.getElementById('dash');
            try {
                // 1. Fetch Accounts
                const accUrl = encodeURIComponent("https://api.cloudflare.com/client/v4/accounts");
                const res = await fetch(PROXY + accUrl, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await res.json();

                if (!data.success) throw new Error("Token Error: " + JSON.stringify(data.errors));

                dash.innerHTML = '';
                
                // 2. Fetch Zones for each account
                for (const acc of data.result) {
                    const section = document.createElement('div');
                    section.className = 'account-section';
                    section.innerHTML = `<div class="acc-header">ACCOUNT: ${acc.name}</div><div class="grid" id="g-${acc.id}"></div>`;
                    dash.appendChild(section);

                    const zoneUrl = encodeURIComponent(`https://api.cloudflare.com/client/v4/zones?account.id=${acc.id}`);
                    const zRes = await fetch(PROXY + zoneUrl, {
                        headers: { 'Authorization': `Bearer ${TOKEN}` }
                    });
                    const zData = await zRes.json();
                    
                    const grid = document.getElementById(`g-${acc.id}`);
                    zData.result.forEach(z => {
                        grid.innerHTML += `
                            <div class="card">
                                <span>${z.name}</span>
                                <span class="status ${z.status}">${z.status}</span>
                            </div>`;
                    });
                }
            } catch (e) {
                dash.innerHTML = `<div class="error"><strong>Fetch Failed:</strong> ${e.message}<br><br>Check if your Token has 'Account Read' and 'Zone Read' permissions.</div>`;
            }
        }
        init();
    </script>
</body>
</html>
