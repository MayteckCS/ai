<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare | Mayteck Dashboard</title>
    <style>
        :root { 
            --orange: #f6821f; --bg: #0f172a; --card: #1e293b; 
            --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 2rem; }
        h1 { color: var(--orange); margin: 0; font-size: 1.5rem; }
        .refresh-btn { background: var(--orange); border: none; color: white; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .account-section { margin-bottom: 40px; }
        .acc-header { font-size: 0.8rem; text-transform: uppercase; color: var(--muted); margin-bottom: 15px; font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .acc-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); border-color: var(--orange); }

        .card-row { display: flex; justify-content: space-between; align-items: center; }
        .domain-name { font-weight: 700; font-size: 1.1rem; color: #fff; }
        
        .status-pill { font-size: 0.65rem; padding: 3px 10px; border-radius: 20px; font-weight: 900; text-transform: uppercase; }
        .active { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
        .pending { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }

        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .detail-item { font-size: 0.75rem; color: var(--muted); display: flex; flex-direction: column; }
        .detail-val { color: var(--text); font-weight: 600; margin-top: 2px; }

        .ssl-badge { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
        #dash-root { min-height: 200px; }
        .loader { text-align: center; padding: 50px; color: var(--muted); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Cloudflare Dashboard</h1>
        <button class="refresh-btn" onclick="load()">Refresh</button>
    </header>

    <div id="dash-root">
        <div class="loader">Querying your Bridge Worker...</div>
    </div>
</div>

<script>
    const BRIDGE_URL = 'https://workera1.mm-5c7.workers.dev/';

    async function load() {
        const root = document.getElementById('dash-root');
        root.innerHTML = '<div class="loader">Syncing data...</div>';
        try {
            const res = await fetch(BRIDGE_URL);
            const data = await res.json();
            root.innerHTML = '';

            data.forEach(acc => {
                const section = document.createElement('div');
                section.className = 'account-section';
                section.innerHTML = `<div class="acc-header">Account: ${acc.name}</div><div class="grid" id="g-${acc.id}"></div>`;
                root.appendChild(section);
                
                const grid = document.getElementById(`g-${acc.id}`);
                acc.zones.forEach(z => {
                    grid.innerHTML += `
                        <div class="card">
                            <div class="card-row">
                                <span class="domain-name">${z.name}</span>
                                <span class="status-pill ${z.status}">${z.status}</span>
                            </div>
                            <div class="details-grid">
                                <div class="detail-item">SSL MODE <span class="detail-val">${z.ssl.toUpperCase()}</span></div>
                                <div class="detail-item">TYPE <span class="detail-val">${z.type.toUpperCase()}</span></div>
                            </div>
                            <div class="card-row" style="margin-top: 5px;">
                                <span class="status-pill ssl-badge">SSL SECURE</span>
                                <span style="font-size: 0.7rem; color: var(--muted)">${z.paused ? '⏸️ DNS Only' : '🛡️ Proxied'}</span>
                            </div>
                        </div>`;
                });
            });
        } catch (e) {
            root.innerHTML = `<div style="color:#ef4444; padding:20px;"><strong>Error:</strong> ${e.message}</div>`;
        }
    }
    load();
</script>
</body>
</html>
