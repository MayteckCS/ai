<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mayteck | Cloudflare Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; margin: 0; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #f6821f; border-bottom: 2px solid #334155; padding-bottom: 15px; margin-bottom: 30px; }
        
        .account-block { margin-bottom: 30px; background: #1e293b; border-radius: 10px; border: 1px solid #334155; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .acc-header { background: #334155; padding: 12px 20px; font-size: 0.85rem; font-weight: bold; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: #334155; }
        .card { background: #1e293b; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .card:hover { background: #24334d; }
        
        .domain-name { font-weight: 500; font-size: 1rem; }
        .status { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; padding: 3px 10px; border-radius: 12px; }
        .active { color: #4ade80; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2); }
        .pending { color: #fbbf24; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); }
        
        #loading { text-align: center; padding: 50px; color: #64748b; font-style: italic; }
        .error { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 20px; border-radius: 8px; border: 1px solid #ef4444; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Cloudflare Dashboard</h1>
    <div id="dash">
        <div id="loading">Requesting data from your Cloudflare Bridge...</div>
    </div>
</div>

<script>
    // This is the specific Worker you just made
    const BRIDGE_URL = 'https://workera1.mm-5c7.workers.dev/';

    async function loadDashboard() {
        const dash = document.getElementById('dash');
        try {
            const response = await fetch(BRIDGE_URL);
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Worker response failed');
            }

            const data = await response.json();
            dash.innerHTML = ''; // Clear loading message

            data.forEach(acc => {
                const section = document.createElement('div');
                section.className = 'account-block';
                section.innerHTML = `
                    <div class="acc-header">Account: ${acc.name}</div>
                    <div class="grid" id="grid-${acc.id}"></div>
                `;
                dash.appendChild(section);
                
                const grid = document.getElementById(`grid-${acc.id}`);
                
                if (acc.zones.length === 0) {
                    grid.innerHTML = '<div style="padding:20px; color:#64748b; background:#1e293b;">No domains found in this account.</div>';
                }

                acc.zones.forEach(z => {
                    grid.innerHTML += `
                        <div class="card">
                            <span class="domain-name">${z.name}</span>
                            <span class="status ${z.status}">${z.status}</span>
                        </div>
                    `;
                });
            });
        } catch (err) {
            dash.innerHTML = `
                <div class="error">
                    <strong>Dashboard Error:</strong> ${err.message}<br><br>
                    <small>Make sure you pasted the "Bridge" code into the Cloudflare Worker editor and clicked 'Deploy'.</small>
                </div>`;
        }
    }

    loadDashboard();
</script>

</body>
</html>
