<!DOCTYPE html>
<html>
<head>
    <title>Mayteck | Cloudflare Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 2rem; }
        .acc-box { margin-bottom: 25px; border: 1px solid #334155; border-radius: 8px; overflow: hidden; }
        .acc-name { background: #334155; padding: 10px; font-weight: bold; font-size: 0.8rem; color: #94a3b8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1px; background: #334155; }
        .card { background: #1e293b; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .status { color: #4ade80; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .err-msg { background: #421; color: #f88; padding: 20px; border-radius: 8px; border: 1px solid #f88; }
    </style>
</head>
<body>
    <h1 style="color:#f6821f">Cloudflare Dashboard</h1>
    <div id="dash">Loading domains...</div>

    <script>
        const WORKER_URL = 'https://workera1.mm-5c7.workers.dev/'; 

        async function load() {
            const dash = document.getElementById('dash');
            try {
                const res = await fetch(WORKER_URL);
                const data = await res.json();

                if (data.error) {
                    dash.innerHTML = `<div class="err-msg"><strong>Worker Error:</strong> ${data.error}</div>`;
                    return;
                }

                dash.innerHTML = '';
                data.forEach(acc => {
                    const section = document.createElement('div');
                    section.className = 'acc-box';
                    section.innerHTML = `<div class="acc-name">${acc.name}</div><div class="grid" id="g-${acc.id}"></div>`;
                    dash.appendChild(section);
                    
                    const grid = document.getElementById(`g-${acc.id}`);
                    acc.zones.forEach(z => {
                        grid.innerHTML += `<div class="card"><span>${z.name}</span><span class="status">${z.status}</span></div>`;
                    });
                });
            } catch (e) {
                dash.innerHTML = `<div class="err-msg"><strong>Page Error:</strong> ${e.message}</div>`;
            }
        }
        load();
    </script>
</body>
</html>
