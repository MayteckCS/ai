<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloudflare | Mayteck Dash</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: #f6821f; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .account-block { margin-top: 25px; background: #1e293b; border-radius: 8px; border: 1px solid #334155; overflow: hidden; }
        .acc-header { background: #334155; padding: 12px; font-size: 0.85rem; font-weight: bold; color: #cbd5e1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1px; background: #334155; }
        .card { background: #1e293b; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; padding: 2px 8px; border-radius: 12px; }
        .active { color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .error { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 20px; border-radius: 8px; border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cloudflare Dashboard</h1>
        <div id="dash">
            <p style="color: #94a3b8;">Attempting to bypass CORS and reach Cloudflare...</p>
        </div>
    </div>

    <script>
        const TOKEN = 'cfut_n2nGhAQcpuMdpNTiyrJlb8MaM2YQf54RpOPhQJB7ddd0bacc';
        
        // This is a more robust proxy mirror
        const PROXY = "https://corsproxy.io/?"; 

        async function cfFetch(url) {
            const response = await fetch(PROXY + encodeURIComponent(url), {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Content-Type': 'application/json'
                }
            });
            if (!response.ok) throw new Error(`Proxy rejected request: ${response.status}`);
            return await response.json();
        }

        async function init() {
            const dash = document.getElementById('dash');
            try {
                // 1. Get Accounts
                const data = await cfFetch("https://api.cloudflare.com/client/v4/accounts");
                
                if (!data.success) throw new Error("Cloudflare API Error: " + data.errors[0].message);

                dash.innerHTML = '';
                
                // 2. Loop through accounts and get zones
                for (const acc of data.result) {
                    const section = document.createElement('div');
                    section.className = 'account-block';
                    section.innerHTML = `<div class="acc-header">ACCOUNT: ${acc.name}</div><div class="grid" id="g-${acc.id}"></div>`;
                    dash.appendChild(section);

                    const zData = await cfFetch(`https://api.cloudflare.com/client/v4/zones?account.id=${acc.id}`);
                    
                    const grid = document.getElementById(`g-${acc.id}`);
                    if (zData.result.length === 0) {
                        grid.innerHTML = '<div style="padding:15px; color:#64748b">No domains found.</div>';
                    }

                    zData.result.forEach(z => {
                        grid.innerHTML += `
                            <div class="card">
                                <span style="font-weight:500;">${z.name}</span>
                                <span class="status ${z.status}">${z.status}</span>
                            </div>`;
                    });
                }
            } catch (e) {
                dash.innerHTML = `
                    <div class="error">
                        <strong>Connection Failed</strong><br>
                        ${e.message}<br><br>
                        <small>If this persists, the proxy is likely blocking the Authorization header. In that case, we MUST use a Cloudflare Worker to act as the backend.</small>
                    </div>`;
            }
        }
        init();
    </script>
</body>
</html>
